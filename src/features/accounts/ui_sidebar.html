<!DOCTYPE html>
<html>
	<head>
		<base target="_top">
		<style>
			body {
				font-family: Arial, sans-serif;
				padding: 16px;
				margin: 0;
			}
			h2 {
				margin-top: 0;
				color: #333;
			}
			.account-list {
				margin: 16px 0;
			}
			.account-item {
				border: 1px solid #ddd;
				border-radius: 4px;
				padding: 12px;
				margin-bottom: 12px;
				background-color: #f9f9f9;
			}
			.account-name {
				font-weight: bold;
				font-size: 16px;
				margin-bottom: 8px;
				color: #1a73e8;
			}
			.account-detail {
				margin: 4px 0;
				font-size: 14px;
				color: #555;
			}
			.status-enabled {
				color: #0f9d58;
				font-weight: bold;
			}
			.status-disabled {
				color: #ea4335;
				font-weight: bold;
			}
			.empty-state {
				text-align: center;
				padding: 32px 16px;
				color: #666;
			}
			.button-container {
				display: flex;
				gap: 8px;
				margin-top: 16px;
			}
			.add-button {
				flex: 1;
				padding: 12px;
				background-color: #1a73e8;
				color: white;
				border: none;
				border-radius: 4px;
				font-size: 14px;
				font-weight: bold;
				cursor: pointer;
			}
			.add-button:hover {
				background-color: #1765cc;
			}
			.delete-button {
				flex: 1;
				padding: 12px;
				background-color: #ea4335;
				color: white;
				border: none;
				border-radius: 4px;
				font-size: 14px;
				font-weight: bold;
				cursor: pointer;
			}
			.delete-button:hover {
				background-color: #d33828;
			}
			.delete-button:disabled {
				background-color: #ccc;
				cursor: not-allowed;
			}
		</style>
	</head>
	<body>
		<h2>Accounts</h2>
		<div id="content"></div>
		<div class="button-container">
			<button class="add-button" onclick="handleAddAccount()">
				+ Add Account
			</button>
			<button id="delete-button" class="delete-button" onclick="handleDeleteAccount()">
				Delete Account
			</button>
		</div>

		<script>
			function renderAccounts(accounts) {
				const contentDiv = document.getElementById('content');
				const deleteButton = document.getElementById('delete-button');

				if (accounts.length === 0) {
					contentDiv.innerHTML = '<div class="empty-state">No accounts configured yet.</div>';
					deleteButton.disabled = true;
				} else {
					const accountsHtml = accounts.map((account) => {
						const statusClass = account.isValid ? 'status-enabled' : 'status-disabled';
						const statusText = account.isValid ? '✓ Enabled' : '✗ Disabled';
						const addedDate = new Date(account.addedAt).toLocaleDateString();

						return `
							<div class="account-item">
								<div class="account-name">${account.uniqueName}</div>
								<div class="account-detail"><strong>Bank:</strong> ${account.details?.provider ?? ''}</div>
								<div class="account-detail"><strong>Currency:</strong> ${account.currency}</div>
								<div class="account-detail">
									<strong>Status:</strong>
									<span class="${statusClass}">${statusText}</span>
								</div>
								<div class="account-detail"><strong>Added:</strong> ${addedDate}</div>
							</div>
						`;
					}).join('');

					contentDiv.innerHTML = `<div class="account-list">${accountsHtml}</div>`;
					deleteButton.disabled = false;
				}
			}

			function handleAddAccount() {
				google.script.run
					.withSuccessHandler(() => {
						// Reload accounts after adding
						google.script.run.withSuccessHandler(renderAccounts).getAccountsData();
					})
					.addAccountDialog();
			}

			function handleDeleteAccount() {
				google.script.run
					.withSuccessHandler(() => {
						// Reload accounts after deleting
						google.script.run.withSuccessHandler(renderAccounts).getAccountsData();
					})
					.deleteAccountDialog();
			}

			// Load accounts on page load
			google.script.run.withSuccessHandler(renderAccounts).getAccountsData();
		</script>
	</body>
</html>
